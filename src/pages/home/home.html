<section class="home-page">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0"><i class="bi bi-globe me-2"></i>Public Events</h1>
  </div>

  <!-- Calendar filter -->
  <div class="mb-3 d-flex flex-wrap gap-2 align-items-center" id="home-calendar-filters">
    <span class="text-muted small me-1">Filter:</span>
    <!-- dynamically populated -->
  </div>

  <!-- FullCalendar mount point -->
  <div id="home-fullcalendar"></div>
</section>

<!-- Event Detail Popup (read-only, for public visitors) -->
<div class="home-event-popup-backdrop d-none" id="home-event-popup-backdrop"></div>
<div class="home-event-popup d-none" id="home-event-popup">
  <div class="home-event-popup-header" id="home-event-popup-header">
    <span class="home-event-popup-title" id="home-event-popup-title"></span>
    <button type="button" class="btn-close btn-close-white btn-sm" id="home-event-popup-close" aria-label="Close"></button>
  </div>
  <div class="home-event-popup-body">
    <div class="home-event-popup-row"><i class="bi bi-clock me-2 text-muted"></i><span id="home-event-popup-date"></span></div>
    <div class="home-event-popup-row"><i class="bi bi-geo-alt me-2 text-muted"></i><span id="home-event-popup-location"></span></div>
    <div class="home-event-popup-row"><i class="bi bi-calendar3 me-2 text-muted"></i><span id="home-event-popup-calendar"></span></div>
    <div class="home-event-popup-row home-event-popup-desc" id="home-event-popup-desc-row">
      <i class="bi bi-text-left me-2 text-muted"></i><span id="home-event-popup-desc"></span>
    </div>
  </div>
</div>
